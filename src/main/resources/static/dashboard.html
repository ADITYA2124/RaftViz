<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RaftViz – Consensus Protocol Visualization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e0e6ed;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      position: relative;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 16px;
      color: #94a3b8;
      font-weight: 400;
    }

    .param-info {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: #cbd5e1;
      backdrop-filter: blur(10px);
    }

    #canvas-wrapper {
      position: relative;
      width: 700px;
      height: 700px;
      margin: 0 auto 48px;
    }

    #canvas {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.4);
      border: 2px solid rgba(148, 163, 184, 0.1);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      border-radius: 24px;
    }

    .node {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      z-index: 10;
    }

    .node-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .node::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, transparent, transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .leader {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 0 40px rgba(16, 185, 129, 0.6), 0 8px 32px rgba(0, 0, 0, 0.3);
      transform: scale(1.15);
      animation: pulse-leader 2s ease-in-out infinite;
    }

    .leader::before {
      background: linear-gradient(135deg, #34d399, #10b981, #059669);
      opacity: 1;
      animation: rotate 3s linear infinite;
    }

    @keyframes pulse-leader {
      0%, 100% { transform: scale(1.15); }
      50% { transform: scale(1.2); }
    }

    .follower {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.4), 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .follower::before {
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      opacity: 0.6;
      animation: rotate 4s linear infinite;
    }

    .candidate {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      box-shadow: 0 0 35px rgba(245, 158, 11, 0.5), 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: pulse-candidate 1.5s ease-in-out infinite;
    }

    .candidate::before {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      opacity: 0.8;
      animation: rotate 2s linear infinite;
    }

    @keyframes pulse-candidate {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .offline {
      background: linear-gradient(135deg, #475569 0%, #334155 100%);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      opacity: 0.5;
      filter: grayscale(1);
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .node:hover {
      transform: scale(1.1);
      z-index: 20;
    }

    .leader:hover {
      transform: scale(1.25);
    }

    .node-id {
      font-size: 20px;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      margin-bottom: 4px;
      z-index: 1;
    }

    .node-role {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.9);
      z-index: 1;
    }

    .node-term {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 2px;
      z-index: 1;
    }

    .info-panel {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .leader-info {
      text-align: center;
      font-size: 24px;
      margin-bottom: 32px;
      padding: 24px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 12px;
    }

    .leader-info.no-leader {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .leader-info strong {
      color: #10b981;
      font-weight: 700;
    }

    .leader-info.no-leader strong {
      color: #f59e0b;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .stat-card {
      padding: 20px;
      background: rgba(30, 41, 59, 0.4);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(148, 163, 184, 0.3);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .stat-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #e0e6ed;
    }

    .connection-line {
      position: absolute;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .node {
      animation: fadeIn 0.6s ease-out;
    }

    .status-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 2s ease-in-out infinite;
    }

    .status-online {
      background: #10b981;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.6);
    }

    .status-offline {
      background: #ef4444;
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(96, 165, 250, 0.6);
      border-radius: 50%;
      animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-700px) translateX(100px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>RaftViz</h1>
    <p class="subtitle">Real-time Raft Consensus Protocol Visualization</p>
    <div class="param-info">
      ?nodes=http://192.168.29.200:8080,http://192.168.29.186:8080
    </div>
  </header>

  <div id="canvas-wrapper">
    <div id="canvas">
      <canvas id="connections"></canvas>
      <div class="particles" id="particles"></div>
    </div>
  </div>

  <div class="info-panel">
    <div id="leader-info" class="leader-info"></div>
    <div id="stats" class="stats-grid"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const nodeUrls = (params.get('nodes') || '').split(',').filter(Boolean);
  const canvas = document.getElementById('canvas');
  const connectionsCanvas = document.getElementById('connections');
  const ctx = connectionsCanvas.getContext('2d');
  const leaderInfo = document.getElementById('leader-info');
  const statsDiv = document.getElementById('stats');
  const particlesDiv = document.getElementById('particles');

  connectionsCanvas.width = 700;
  connectionsCanvas.height = 700;

  // Create floating particles
  function createParticles() {
    for (let i = 0; i < 20; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 700 + 'px';
      particle.style.top = Math.random() * 700 + 'px';
      particle.style.animationDelay = Math.random() * 8 + 's';
      particle.style.animationDuration = (8 + Math.random() * 4) + 's';
      particlesDiv.appendChild(particle);
    }
  }

  createParticles();

  async function fetchState(url) {
    try {
      const resp = await fetch(url + '/raft/state', { cache: 'no-store' });
      if (!resp.ok) throw new Error();
      const s = await resp.json();
      return { ok: true, url, state: s };
    } catch (e) {
      return {
        ok: false,
        url,
        state: {
          nodeId: url,
          role: 'OFFLINE',
          currentTerm: 0,
          leaderId: '—',
          commitIndex: 0,
          lastApplied: 0,
          logSize: 0
        }
      };
    }
  }

  function drawConnections(stats, positions) {
    ctx.clearRect(0, 0, 700, 700);
    const leader = stats.find(s => s.state.role === 'LEADER');

    if (leader) {
      const leaderIdx = stats.indexOf(leader);
      const leaderPos = positions[leaderIdx];

      stats.forEach((node, i) => {
        if (i !== leaderIdx && node.state.role !== 'OFFLINE') {
          const nodePos = positions[i];

          const gradient = ctx.createLinearGradient(
            leaderPos.x, leaderPos.y,
            nodePos.x, nodePos.y
          );
          gradient.addColorStop(0, 'rgba(16, 185, 129, 0.4)');
          gradient.addColorStop(1, 'rgba(59, 130, 246, 0.4)');

          ctx.strokeStyle = gradient;
          ctx.lineWidth = 2;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          ctx.moveTo(leaderPos.x, leaderPos.y);
          ctx.lineTo(nodePos.x, nodePos.y);
          ctx.stroke();
        }
      });
    }
  }

  function renderCircle(stats) {
    const existingNodes = Array.from(canvas.querySelectorAll('.node'));
    existingNodes.forEach(node => {
      if (!node.classList.contains('particles')) {
        node.remove();
      }
    });

    const n = stats.length;
    const cx = 350, cy = 350, r = 220;
    const positions = [];

    stats.forEach((node, i) => {
      const angle = (2 * Math.PI * i) / n - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      positions.push({ x, y });

      const div = document.createElement('div');
      div.className = 'node';

      if (node.state.role === 'LEADER') div.classList.add('leader');
      else if (node.state.role === 'FOLLOWER') div.classList.add('follower');
      else if (node.state.role === 'CANDIDATE') div.classList.add('candidate');
      else div.classList.add('offline');

      div.style.left = (x - 60) + 'px';
      div.style.top = (y - 60) + 'px';
      div.style.animationDelay = (i * 0.1) + 's';

      const shortId = node.state.nodeId.includes('://')
        ? node.state.nodeId.split('://')[1].split(':')[0].split('.').slice(-2).join('.')
        : node.state.nodeId;

      div.innerHTML = `
        <div class="node-inner">
          <div class="node-id">${shortId}</div>
          <div class="node-role">${node.state.role}</div>
          <div class="node-term">term ${node.state.currentTerm}</div>
        </div>
      `;

      canvas.appendChild(div);
    });

    drawConnections(stats, positions);

    const leader = stats.find(s => s.state.role === 'LEADER');
    if (leader) {
      leaderInfo.className = 'leader-info';
      const shortId = leader.state.nodeId.includes('://')
        ? leader.state.nodeId.split('://')[1].split(':')[0].split('.').slice(-2).join('.')
        : leader.state.nodeId;
      leaderInfo.innerHTML = `
        <span class="status-indicator status-online"></span>
        Leader: <strong>${shortId}</strong> (term ${leader.state.currentTerm})
      `;
    } else {
      leaderInfo.className = 'leader-info no-leader';
      leaderInfo.innerHTML = `
        <span class="status-indicator status-offline"></span>
        <strong>No leader</strong> – election in progress
      `;
    }

    const onlineNodes = stats.filter(s => s.state.role !== 'OFFLINE').length;
    const totalTerm = Math.max(...stats.map(s => s.state.currentTerm));
    const totalCommits = Math.max(...stats.map(s => s.state.commitIndex));

    statsDiv.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Nodes</div>
        <div class="stat-value">${stats.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Online</div>
        <div class="stat-value">${onlineNodes}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Current Term</div>
        <div class="stat-value">${totalTerm}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Commit Index</div>
        <div class="stat-value">${totalCommits}</div>
      </div>
    `;
  }

  async function tick() {
    const stats = await Promise.all(nodeUrls.map(fetchState));
    renderCircle(stats);
  }

  if (nodeUrls.length) {
    tick();
    setInterval(tick, 1000);
  } else {
    leaderInfo.className = 'leader-info no-leader';
    leaderInfo.innerHTML = '<strong>No nodes specified</strong> – Add ?nodes= parameter';
  }
</script>
</body>
</html>
