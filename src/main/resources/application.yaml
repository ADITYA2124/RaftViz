server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info

raft:
  node-id: ${NODE_ID:node-1}
  advertise-addr: ${ADVERTISE_ADDR:http://localhost:8080}
  election-timeout-min: ${ELECTION_TIMEOUT_MIN:1200}
  election-timeout-max: ${ELECTION_TIMEOUT_MAX:2000}
  heartbeat-interval: ${HEARTBEAT_INTERVAL:500}
  discovery:
    multicast-group: ${RAFT_DISCOVERY_GROUP:230.0.0.15}
    multicast-port: ${RAFT_DISCOVERY_PORT:4446}
    announce-interval-ms: ${RAFT_DISCOVERY_ANNOUNCE_INTERVAL_MS:1000}
    stale-after-ms: ${RAFT_DISCOVERY_STALE_AFTER_MS:4000}
    evict-after-ms: ${RAFT_DISCOVERY_EVICT_AFTER_MS:30000}
